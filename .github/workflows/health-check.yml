name: Automated Health Check

on:
  schedule:
    # 매시간 정각 실행 (UTC 기준)
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  health-check:
    runs-on: ubuntu-latest
    
    steps:
      - name: Run Health Check
        id: health_check
        run: |
          echo "🏥 서버 헬스체크 시작..."
          
          RESPONSE=$(curl -s -o response.txt -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            "${{ secrets.SUPABASE_URL }}/functions/v1/make-server-a586c31f/health")
          
          echo "HTTP Status: $RESPONSE"
          echo "Response Body:"
          cat response.txt
          
          if [ "$RESPONSE" -ne 200 ]; then
            echo "❌ 헬스체크 실패!"
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
          else
            echo "✅ 헬스체크 성공!"
            echo "status=success" >> $GITHUB_OUTPUT
          fi

      - name: Send Slack Notification on Failure
        if: failure()
        run: |
          curl -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "text": "🚨 *배너 메이커 서버 다운!*",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "🚨 서버 헬스체크 실패",
                    "emoji": true
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*서비스:*\n배너 메이커"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*시각:*\n'"$(date -u +"%Y-%m-%d %H:%M:%S UTC")"'"
                    }
                  ]
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "서버가 응답하지 않습니다. 확인이 필요합니다."
                  }
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "GitHub Actions 로그 보기"
                      },
                      "url": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  ]
                }
              ]
            }'

      - name: Send Slack Notification on Success (Optional)
        if: success() && steps.health_check.outputs.status == 'success'
        run: |
          # 성공 시에는 알림 안 보냄 (필요하면 주석 해제)
          echo "✅ 헬스체크 성공 - 알림 생략"
